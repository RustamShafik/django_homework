{% extends 'blog/base.html' %}
{% block content %}
<div class="container">
    <div class="row">
        <div class="col-6">
            <form class="row" method="post" enctype="multipart/form-data">
                <div class="card">
                    <div class="card-body">
                        <p class="card-text">Действительно удалить {{ object.title }}?</p>
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger me-2">
                            Удалить
                        </button>
                        <a class="btn btn-secondary" href="{% url 'blog:blog_list' %}" role="button">Отмена</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
