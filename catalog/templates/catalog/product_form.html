{% extends 'catalog/base.html' %}
{% load my_tags %}
{% block content %}
<h2>Форма для продукта</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'catalog:products_list' %}" class="btn btn-primary">Отменить</a>
</form>
{% endblock %}
